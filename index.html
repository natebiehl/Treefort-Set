// ── Per-song state helpers ────────────────────────────
// Each song uses its own state — we set the shared globals before
// calling any key/mode function, then save back afterward.

function loadSongState(id) {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  const st = song.state;
  keyRoot      = st.keyRoot;
  keyMode      = st.keyMode;
  songSections = st.songSections;
  detectedKey  = st.detectedKey;
  keyOverride  = st.keyOverride;
  soloChord    = st.soloChord;
  soloSection  = st.soloSection;
  mapRendered  = st.mapRendered;
  nodeDisplay  = st.nodeDisplay;
  fbdNoteMode  = st.fbdNoteMode;
  // Restore voicing state
  keyVoicings  = st.keyVoicings || new Set(VOICING_ORDER);
  activeSongId = id;
}

function saveSongState(id) {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  // Also save chart text
  const ta = document.getElementById('song-paste-' + id);
  if (ta) song.state.chartText = ta.value;
  song.state = {
    ...song.state,
    keyRoot, keyMode, songSections: JSON.parse(JSON.stringify(songSections)),
    detectedKey, keyOverride, soloChord, soloSection,
    mapRendered, nodeDisplay, fbdNoteMode,
    keyVoicings: new Set(keyVoicings),
  };
}

let activeSongId = null;

// ── Init a song panel's dynamic elements ─────────────
function initSongPanel(id) {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  const st = song.state;

  // Key grids
  buildKeyGridsSong(id);

  // Voicing grid
  const g = document.getElementById('key-voicing-grid-' + id);
  if (g) {
    g.innerHTML = '';
    const vs = st.keyVoicings || new Set(VOICING_ORDER);
    VOICING_ORDER.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'voicing-btn' + (vs.has(v) ? ' active' : '');
      btn.innerHTML = `<span class="dot" style="background:${COLORS[v]}"></span>${VOICING_LABELS[v]}`;
      btn.title = 'Tap to toggle · Hold to solo';
      btn.onclick = () => {
        loadSongState(id);
        if (keyVoicings.has(v)) { keyVoicings.delete(v); btn.classList.remove('active'); }
        else { keyVoicings.add(v); btn.classList.add('active'); }
        saveSongState(id);
        liveUpdateSong(id);
      };
      let pt = null;
      const sp = () => { pt = setTimeout(() => {
        pt = null;
        loadSongState(id);
        const solo = keyVoicings.size===1 && keyVoicings.has(v);
        if (solo) { VOICING_ORDER.forEach(vv=>keyVoicings.add(vv)); g.querySelectorAll('.voicing-btn').forEach(b=>b.classList.add('active')); }
        else { keyVoicings.clear(); keyVoicings.add(v); g.querySelectorAll('.voicing-btn').forEach(b=>{ const bv=VOICING_ORDER[Array.from(g.children).indexOf(b)]; b.classList.toggle('active',bv===v); }); }
        saveSongState(id); liveUpdateSong(id);
      }, 500); };
      const cp = () => { if(pt){clearTimeout(pt);pt=null;} };
      btn.addEventListener('touchstart',sp,{passive:true}); btn.addEventListener('touchend',cp); btn.addEventListener('touchmove',cp);
      btn.addEventListener('mousedown',sp); btn.addEventListener('mouseup',cp); btn.addEventListener('mouseleave',cp);
      g.appendChild(btn);
    });
  }

  // Sliders
  ['coverage','ease','chord'].forEach(wid => {
    const sl = document.getElementById(`w-${wid}-${id}`);
    const vl = document.getElementById(`wv-${wid}-${id}`);
    if (sl && vl) sl.addEventListener('input', () => { vl.textContent = sl.value; liveUpdateSong(id); });
  });

  // If song already has sections, render them
  if (st.songSections.length) {
    loadSongState(id);
    renderSectionListSong(id);
    if (st.detectedKey) renderKeyDetectionSong(id, [st.detectedKey]);
    if (st.mapRendered) computeKeyMapSong(id);
  }
}

function buildKeyGridsSong(id) {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  const st = song.state;

  [
    ['key-root-grid-' + id,        'key-mode-grid-' + id       ],
    ['key-root-grid-manual-' + id, 'key-mode-grid-manual-' + id],
  ].forEach(([rootId, modeId]) => {
    const rg = document.getElementById(rootId);
    const mg = document.getElementById(modeId);
    if (!rg || !mg) return;
    rg.innerHTML = ''; mg.innerHTML = '';
    chromatic.forEach(n => {
      const btn = document.createElement('button');
      btn.className = 'note-mini-btn' + (n === st.keyRoot ? ' active' : '');
      btn.textContent = n;
      btn.onclick = () => {
        loadSongState(id);
        keyRoot = n;
        song.state.keyRoot = n;
        // Sync all root grids for this song
        ['key-root-grid-'+id,'key-root-grid-manual-'+id].forEach(gid => {
          const g = document.getElementById(gid);
          if(g) g.querySelectorAll('.note-mini-btn').forEach(b=>b.classList.toggle('active',b.textContent===n));
        });
        liveUpdateSong(id);
      };
      rg.appendChild(btn);
    });
    MODES.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'key-mode-btn' + (m.name === st.keyMode ? ' active' : '');
      btn.textContent = m.label;
      btn.onclick = () => {
        loadSongState(id);
        keyMode = m.name;
        song.state.keyMode = m.name;
        ['key-mode-grid-'+id,'key-mode-grid-manual-'+id].forEach(gid => {
          const g = document.getElementById(gid);
          if(g) g.querySelectorAll('.key-mode-btn').forEach(b=>{ const mm=MODES.find(mm=>mm.label===b.textContent); b.classList.toggle('active',mm&&mm.name===m.name); });
        });
        liveUpdateSong(id);
      };
      mg.appendChild(btn);
    });
  });
}

// ── Per-song wrappers for key/mode functions ──────────
function parseSong(id) {
  const ta = document.getElementById('song-paste-' + id);
  if (!ta) return;
  const text = ta.value;
  loadSongState(id);
  songSections = parseSongText(text);
  if (!songSections.length) { alert('No chords found — check your format.'); return; }
  const allChords = songSections.flatMap(s => s.chords.map(c => c.name));
  const candidates = detectKey(allChords);
  if (candidates.length) { detectedKey = candidates[0]; keyRoot = detectedKey.root; keyMode = detectedKey.mode; }
  document.getElementById('manual-key-panel-' + id).style.display = 'none';
  document.getElementById('song-sections-' + id).style.display = '';
  saveSongState(id);
  buildKeyGridsSong(id);
  renderSectionListSong(id);
  renderKeyDetectionSong(id, candidates.slice(0,3));
  computeKeyMapSong(id);
}

function liveUpdateSong(id) {
  const song = songs.find(s => s.id === id);
  if (song && song.state.mapRendered) computeKeyMapSong(id);
}

function setNodeDisplaySong(id, btn) {
  document.querySelectorAll(`#node-display-toggle-${id} .node-disp-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadSongState(id);
  nodeDisplay = btn.dataset.mode;
  saveSongState(id);
  liveUpdateSong(id);
}

function toggleKeyOverride(id) {
  loadSongState(id);
  keyOverride = !keyOverride;
  saveSongState(id);
  document.getElementById('key-override-panel-' + id).style.display = keyOverride ? '' : 'none';
  const btn = document.querySelector(`#song-key-row-${id} .song-key-override-btn`);
  if (btn) btn.textContent = keyOverride ? 'Use Detected' : 'Override';
  if (!keyOverride && detectedKey) { keyRoot = detectedKey.root; keyMode = detectedKey.mode; saveSongState(id); liveUpdateSong(id); }
}

function renderSectionListSong(id) {
  const el = document.getElementById('section-list-' + id);
  if (!el) return;
  el.innerHTML = '';
  const song = songs.find(s => s.id === id);
  if (!song) return;
  const ri = noteIdx(song.state.keyRoot);
  const mode = MODES.find(m => m.name === song.state.keyMode);
  const scaleSet = mode ? new Set(mode.intervals.map(s => chromatic[(ri+s)%12])) : new Set();

  song.state.songSections.forEach((sec, si) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.style.opacity = sec.active ? '1' : '0.45';

    // ON/OFF toggle
    const tog = document.createElement('button');
    tog.className = 'section-active-btn' + (sec.active ? '' : ' dim');
    tog.textContent = sec.active ? 'ON' : 'OFF';
    tog.style.cssText = 'flex-shrink:0;min-width:48px;min-height:36px;font-size:12px;-webkit-tap-highlight-color:transparent;';
    tog.onclick = e => {
      e.stopPropagation();
      sec.active = !sec.active;
      tog.textContent = sec.active ? 'ON' : 'OFF';
      tog.classList.toggle('dim', !sec.active);
      card.style.opacity = sec.active ? '1' : '0.45';
      loadSongState(id); soloChord = null; soloSection = null; saveSongState(id);
      liveUpdateSong(id);
    };
    card.appendChild(tog);

    // SOLO
    const soloBtn = document.createElement('button');
    soloBtn.className = 'section-solo-btn' + (song.state.soloSection === si ? ' active' : '');
    soloBtn.textContent = 'SOLO';
    soloBtn.onclick = e => {
      e.stopPropagation();
      loadSongState(id);
      if (soloSection === si) { soloSection = null; soloBtn.classList.remove('active'); }
      else { soloSection = si; soloChord = null; document.querySelectorAll(`#section-list-${id} .section-solo-btn`).forEach(b=>b.classList.remove('active')); soloBtn.classList.add('active'); }
      saveSongState(id); liveUpdateSong(id);
    };
    card.appendChild(soloBtn);

    // Label
    const lw = document.createElement('div');
    lw.className = 'section-label-wrap';
    lw.style.cssText = 'flex:0 0 auto;min-width:90px;';
    const lb = document.createElement('button');
    lb.className = 'section-label-btn'; lb.textContent = sec.label; lb.title = 'Tap to rename';
    lb.onclick = () => startRenameSong(id, si, lb, lw);
    lw.appendChild(lb); card.appendChild(lw);

    // Chord pills
    const pw = document.createElement('div'); pw.className = 'section-chords';
    const modeObj = MODES.find(m => m.name === song.state.keyMode);
    sec.chords.forEach(ch => {
      const info = modeObj ? chordPillInfo(ch.name, song.state.keyRoot, modeObj.intervals) : {cls:'chord-pill',label:ch.name};
      let cls = info.cls + (ch.active ? '' : ' chord-inactive');
      const p = document.createElement('div'); p.className = cls; p.textContent = info.label;
      p.style.cssText = 'cursor:pointer;user-select:none;-webkit-user-select:none;white-space:nowrap;opacity:' + (ch.active?'1':'0.35') + ';';
      p.onclick = () => {
        loadSongState(id);
        if (soloChord && soloChord.name === ch.name) { soloChord = null; p.classList.remove('chord-solo'); }
        else if (soloChord) { document.querySelectorAll(`#section-list-${id} .chord-pill.chord-solo`).forEach(el=>el.classList.remove('chord-solo')); const parsed=parseChordName(ch.name); soloChord=parsed?{name:ch.name,root:parsed.root,quality:parsed.quality}:null; if(soloChord)p.classList.add('chord-solo'); }
        else { const parsed=parseChordName(ch.name); soloChord=parsed?{name:ch.name,root:parsed.root,quality:parsed.quality}:null; if(soloChord)p.classList.add('chord-solo'); }
        saveSongState(id); liveUpdateSong(id);
      };
      pw.appendChild(p);
    });
    card.appendChild(pw);
    el.appendChild(card);
  });
}

function startRenameSong(id, si, btn, wrap) {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  const inp = document.createElement('input');
  inp.className = 'section-label-input'; inp.value = song.state.songSections[si].label;
  wrap.replaceChild(inp, btn); inp.focus(); inp.select();
  const commit = () => {
    const val = inp.value.trim() || song.state.songSections[si].label;
    song.state.songSections[si].label = val;
    const nb = document.createElement('button');
    nb.className = 'section-label-btn'; nb.textContent = val; nb.title = 'Tap to rename';
    nb.onclick = () => startRenameSong(id, si, nb, wrap);
    wrap.replaceChild(nb, inp);
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => { if(e.key==='Enter'||e.key==='Escape') commit(); });
}

function renderKeyDetectionSong(id, candidates) {
  const row = document.getElementById('song-key-row-' + id);
  const det = document.getElementById('song-key-detected-' + id);
  if (!row || !det) return;
  row.style.display = '';
  if (!candidates.length) { det.textContent = 'Could not detect key'; return; }
  const top = candidates[0];
  const ml = MODES.find(m => m.name === top.mode)?.label || top.mode;
  const pct = Math.round(top.coverage * 100);
  const alts = candidates.slice(1).map(c => `${c.root} ${MODES.find(m=>m.name===c.mode)?.label||c.mode}`).join(', ');
  det.innerHTML = `Detected: <strong>${top.root} ${ml}</strong> &nbsp;(${pct}% coverage)${alts?`<span style="color:var(--text-dim);font-size:10px"> · Alt: ${alts}</span>`:''}`;
}

function computeKeyMapSong(id) {
  loadSongState(id);
  // Read weights from this song's sliders
  const wCov   = parseInt(document.getElementById('w-coverage-' + id)?.value || 6);
  const wEase  = parseInt(document.getElementById('w-ease-' + id)?.value || 4);
  const wChord = parseInt(document.getElementById('w-chord-' + id)?.value || 5);
  mapRendered = true;
  saveSongState(id);
  // Call shared computeKeyMap with song-specific result div and sliders
  _computeKeyMapCore(id, wCov, wEase, wChord);
}

// ═══════════════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(name) {
  // Save current song state if leaving a song tab
  if (activeSongId !== null && name !== 'song-' + activeSongId) {
    saveSongState(activeSongId);
  }

  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  const tab   = document.getElementById('tab-' + name);
  const panel = document.getElementById('panel-' + name);
  if (tab)   tab.classList.add('active');
  if (panel) panel.classList.add('active');

  // Scroll tab into view on mobile
  if (tab) tab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});

  // Panel-specific init
  if (name === 'settings') {
    renderSetOrder();
    renderCopedentTable();
    activeSongId = null;
  } else if (name.startsWith('song-')) {
    const id = parseInt(name.replace('song-',''));
    activeSongId = id;
    loadSongState(id);
    // Re-render sections if needed
    const song = songs.find(s => s.id === id);
    if (song && song.state.songSections.length) {
      renderSectionListSong(id);
      // Rebuild interactive section cards near map
      buildSongResultSections(id);
    }
  }
}

function updateSetName(val) {
  setName = val;
  const el = document.getElementById('header-title');
  if (el) el.textContent = val || 'Steel Note Finder';
}

    };

    lbl.className = 'section-label-btn'; lbl.style.cssText = 'cursor:default;flex:0 0 auto;min-width:80px;';

        saveSongState(id); liveUpdateSong(id);

}

  let html = `<table class="copedent-table">
    <thead><tr>
      <th colspan="2">Tuning</th>
      ${leftLevers.map(v=>`<th style="color:${COLORS[v]||'var(--text-dim)'}">${v}</th>`).join('')}
      <th style="border:none;background:var(--bg);width:8px"></th>
      ${pedals.map(v=>`<th style="color:${COLORS[v]||'var(--text-dim)'}">${v}</th>`).join('')}
      <th style="border:none;background:var(--bg);width:8px"></th>
      ${rightLevers.map(v=>`<th style="color:${COLORS[v]||'var(--text-dim)'}">${v}</th>`).join('')}
    </tr></thead><tbody>`;
  for (let s=1; s<=10; s++) {
    const open = openStrings[s];
    html += `<tr><td class="string-num">S${s}</td><td class="open-note">${open}</td>`;
    for (const v of leftLevers) {
      const ch = stringChanges[s].find(c=>c.v===v);
      html += ch ? `<td class="has-change" title="${ch.s>0?'+':''}${ch.s} semitones">${shiftNote(open,ch.s)}</td>`
                 : `<td class="empty">·</td>`;
    }
    html += `<td style="border:none;background:var(--bg)"></td>`;
    for (const v of pedals) {
      const ch = stringChanges[s].find(c=>c.v===v);
      html += ch ? `<td class="has-change">${shiftNote(open,ch.s)}</td>`
                 : `<td class="empty">·</td>`;
    }
    html += `<td style="border:none;background:var(--bg)"></td>`;
    for (const v of rightLevers) {
      const ch = stringChanges[s].find(c=>c.v===v);
      html += ch ? `<td class="has-change">${shiftNote(open,ch.s)}</td>`
                 : `<td class="empty">·</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table>
    <div style="margin-top:0.75rem;font-size:10px;color:var(--text-dim);letter-spacing:0.08em">
      Result notes at open position · colors match voicing buttons
    </div>`;
  wrap.innerHTML = html;
}

// ── Startup ───────────────────────────────────────────
renderSetOrder();
renderCopedentTable();
switchTab('settings');
</script>
</body>
</html>
